name: Hourly Petition Stats Tracker

on:
  schedule:
    - cron: '0 * * * *'  # Runs automatically at the start of every hour
  workflow_dispatch:     # Enables an override button to trigger manually anytime

permissions:
  contents: write

jobs:
  track-and-save:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Initialize Cloud Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Requirements
        run: pip install requests beautifulsoup4

      - name: Run Extraction Engine
        run: python tracker.py

      - name: Commit and Push Updated CSV Data Log
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add petition_data.csv
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated Sync: $(date)" && git push)
